<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="icon" href="Images/calculator-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div id="calculadora">

            <div id="divtexto"><h1>Calculadora</h1></div>
                <div id="display">
                    <h4>0</h4>
                </div>
            <div class="flex">
                <div id="grid1">
                    <button class="botao" onclick="adicionarnumero(1)">1</button>
                    <button class="botao" onclick="adicionarnumero(2)">2</button>
                    <button class="botao" onclick="adicionarnumero(3)">3</button>
                    <button class="botao" onclick="adicionarnumero(4)">4</button>
                    <button class="botao" onclick="adicionarnumero(5)">5</button>
                    <button class="botao" onclick="adicionarnumero(6)">6</button>
                    <button class="botao" onclick="adicionarnumero(7)">7</button>
                    <button class="botao" onclick="adicionarnumero(8)">8</button>
                    <button class="botao" onclick="adicionarnumero(9)">9</button>
                    <button class="botao" onclick="virgula()">,</button>
                    <button class="botao" onclick="adicionarnumero(0)">0</button>
                    <button class="botao" onclick="apagar()"><<</button>
                </div>
                <div id="grid2">
                    <button class="botao" onclick="adicionarsimbolo('+')">+</button>
                    <button class="botao" onclick="adicionarsimbolo('-')">-</button>
                    <button class="botao" onclick="adicionarsimbolo('x')">x</button>
                    <button class="botao" onclick="adicionarsimbolo('÷')">÷</button>
                </div>
            </div>

            <div id="botaoreset">
                <button onclick="reset()"><img src="Images/resetbutton.png" alt="reset"></button>
            </div>

            <div id="botaohistorico">
                <button onclick="historicos()"><img src="Images/buttonhistorico_icon.png" alt="reset"></button>
            </div>
            <div>
                <h6 id="textohistorico">voltando no historico...</h6>
            </div>

            <div id="enterbutton">
                 <button class="botao" onclick="calcular()">Enter</button>
            </div>

        </div>

</body>

    <script src="script.js"></script>

</html>
